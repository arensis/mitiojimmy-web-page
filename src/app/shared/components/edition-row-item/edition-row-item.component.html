<div class="edit-row">
  <div class="item-data">
    <ng-content></ng-content>
  </div>
  <div class="action-buttons">
    <button mat-button mat-accent color="accent" class="edit" (click)="editRow()">
      <mat-icon>edit</mat-icon>
      Edit
    </button>
    <button mat-button mat-accent color="warn" class="delete" (click)="deleteRow()">
      <mat-icon>delete</mat-icon>
      Delete
    </button>
  </div>
</div>
