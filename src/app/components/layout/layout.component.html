<!-- En móvil o resoluciones menores a XX no puede ser fija, tiene que ser toggle side nav -->
<mat-sidenav-container>
  <mat-sidenav #sidenav mode="side" [opened]="isDesktopDevice" class="backoffice-sidenav" [fixedInViewport]="true">
    <div class="close-button-container" [ngClass]="{'mobile': !isDesktopDevice}">
      <button *ngIf="!isDesktopDevice" mat-icon-button class="close-button" (click)="sidenav.toggle()">
        <fa-icon [icon]="closeIcon"></fa-icon>
      </button>
    </div>
    <div class="divider"></div>
    <ul class="sections">
      <li>
        <a [routerLink]="['../dashboard']" [matTooltip]="'Dashboard'" [matTooltipPosition]="'right'" routerLinkActive="active" (click)="sectionClick(sidenav)">
          <div class="section-icon dashboard-icon">
            <fa-icon [icon]="dashboardIcon"></fa-icon>
          </div>
        </a>
      </li>
      <li>
        <a [routerLink]="['../shows']" routerLinkActive="active" (click)="sectionClick(sidenav)">
          <div class="section-icon shows-icon">
            <fa-icon [icon]="showsIcon"></fa-icon>
          </div>
        </a>
      </li>
      <li>
        <a [routerLink]="['../albums']" routerLinkActive="active" (click)="sectionClick(sidenav)">
          <div class="section-icon albums-icon">
            <fa-icon [icon]="albumsIcon"></fa-icon>
          </div>
        </a>
      </li>
      <li>
        <a [routerLink]="['../videos']" routerLinkActive="active" (click)="sectionClick(sidenav)">
          <div class="section-icon videos-icon">
            <fa-icon [icon]="videosIcon"></fa-icon>
          </div>
        </a>
      </li>
      <li>
        <a [routerLink]="['../info']" routerLinkActive="active" (click)="sectionClick(sidenav)">
          <div class="section-icon info-icon">
            <fa-icon [icon]="infoIcon"></fa-icon>
          </div>
        </a>
      </li>
    </ul>
  </mat-sidenav>

  <mat-sidenav #avatarMenu position="end" class="avatar-sidenav">
    <div class="avatar-sidenav-header">
      <div class="avatar">
        <div class="user-picture-profile">
          <img src="assets/images/aksel-profile-picture.jpg" />
        </div>
        <span class="user-name">
          Aksel Gil Vasco
        </span>
      </div>
      <div class="close-button-container" [ngClass]="{'mobile': !isDesktopDevice}">
        <button mat-icon-button class="close-button" (click)="avatarMenu.toggle()">
          <fa-icon [icon]="closeIcon"></fa-icon>
        </button>
      </div>
    </div>
    <div class="divider"></div>
    <ul class="avatar-sections">
      <li>
        <a>
          <div class="avatar-sections-icon">
            <fa-icon [icon]="profileIcon"></fa-icon>
            <span>Perfil</span>
          </div>
        </a>
      </li>
      <li>
        <a>
          <div class="avatar-sections-icon">
            <fa-icon [icon]="signOutIcon"></fa-icon>
            <span>Cerrar sesión</span>
          </div>

        </a>
      </li>
    </ul>
  </mat-sidenav>

  <mat-sidenav-content class="body">
    <mat-toolbar class="header">
      <button *ngIf="!isDesktopDevice && !sidenav.opened" mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>My App</span>
      <span class="example-spacer"></span>
      <div class="avatar">
        <div class="user-picture-profile" (click)="avatarMenu.toggle()">
          <img src="assets/images/aksel-profile-picture.jpg" />
        </div>
        <!-- <span class="user-name">
          Aksel Gil Vasco
        </span> -->
      </div>
    </mat-toolbar>
    <router-outlet name="backoffice"></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
