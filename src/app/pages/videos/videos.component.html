<app-edition-list-container
  *ngFor="let band of bands; let i = index; trackBy: trackFn"
  [items]="band.videos"
  [title]="band.bandName"
  [addItemText]="('new-video' | translate)"
  (onCreate)="openFormDialog()"
>
  <ng-template let-item>
    <app-video-row [video]="item" (onEdit)="openFormDialog(item)" (onDelete)="deleteVideo(item)"></app-video-row>
  </ng-template>
</app-edition-list-container>
